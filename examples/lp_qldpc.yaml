# Lifted-product (LP) qLDPC code with transversal magic states.
#
# Models the high-rate quantum LDPC architecture of Cain et al. 2026,
# "Shor's algorithm is possible with as few as 10,000 reconfigurable
# atomic qubits" (arXiv:2603.28627). The paper's RSA-2048 memory code is
# lp243'7 with parameters approximately [[5278, 1480, <=24]] -- 5,278
# physical qubits encoding 1,480 logical qubits (a ~28% encoding rate).
#
# Two features distinguish this from a surface code:
#
#  1. transversal_magic_states: true
#     T and CCZ/Toffoli gates are applied as native transversal logical
#     operations with magic-state cultivation. There is NO separate
#     distillation factory, and a CCZ counts as one logical cycle rather
#     than four T-gate equivalents. This is what removes the ~13M-qubit
#     T-factory term that dominates a surface-code estimate.
#
#  2. qubits_formula is (nearly) constant in d.
#     A high-rate qLDPC code keeps its physical-qubit overhead per logical
#     qubit roughly fixed as the distance grows, unlike the surface code's
#     2*d^2. The value 7.886 is the effective atoms-per-algorithmic-logical
#     -qubit of the paper's "space-efficient" RSA-2048 architecture:
#     11,033 atoms / 1,399 algorithmic logical qubits. It amortizes the
#     lp243'7 memory code (n/k = 3.57) plus the computational blocks and
#     cultivation ancillas over the algorithm's logical qubits.
#
# Usage:
#   quompass estimate --spec examples/shor_2048_gidney2025.yaml \
#       --hardware examples/neutral_atom.yaml \
#       --qec examples/lp_qldpc.yaml
#
# Formula variables: d (code distance); t_1q, t_2q, t_meas, t_jm (gate
# times in seconds). Functions: ceil, floor, round, sqrt, log, log2, ...

name: lp_qldpc
threshold: 0.008          # circuit-level QEC threshold for the LP code family
prefactor: 2.0e-5         # crossing prefactor; tuned so the distance search
                          # selects d ~ 25, consistent with lp243'7 (d <= 24)
distance_coefficient_power: 0.0

# Effective physical atoms per algorithmic logical qubit (see note above).
qubits_formula: "7.886"

# Algorithmic fault tolerance: a logical cycle is a small, distance-
# independent number of stabilizer rounds (~3), not d rounds. With the
# neutral-atom hardware's 1 ms round this gives a ~3 ms logical cycle.
cycle_time_formula: "3 * t_meas"

# Native transversal T / CCZ -- no magic-state distillation factory.
transversal_magic_states: true
